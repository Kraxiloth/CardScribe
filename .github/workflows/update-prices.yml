name: Update Prices

on:
  schedule:
    - cron: '0 4 * * *'  # 4:00 AM UTC daily (6:00 AM Norway time)
  workflow_dispatch:      # Allow manual trigger from GitHub Actions tab

jobs:
  scrape:
    runs-on: windows-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Scrape prices
        shell: powershell
        run: powershell.exe -ExecutionPolicy Bypass -File scripts/scrape_prices.ps1

      - name: Commit updated prices
        shell: powershell
        run: |
          git config user.name  "CardScribe Price Bot"
          git config user.email "bot@cardscribe.sorcery.no"
          git add public/prices.json
          $diff = git diff --cached --quiet; if ($LASTEXITCODE -ne 0) {
            $date = Get-Date -Format 'yyyy-MM-dd'
            git commit -m "chore: update prices $date"
            git push
          } else {
            Write-Host "No changes to commit"
          }