name: Update Prices

on:
  schedule:
    - cron: '0 4 * * *'  # 4:00 AM UTC daily (6:00 AM Norway time)
  workflow_dispatch:      # Allow manual trigger from GitHub Actions tab

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install playwright fuzzywuzzy python-Levenshtein beautifulsoup4
          python -m playwright install chromium
          python -m playwright install-deps chromium

      - name: Scrape prices
        run: python scripts/scrape_prices.py --live

      - name: Commit updated prices
        run: |
          git config user.name  "CardScribe Price Bot"
          git config user.email "bot@cardscribe.sorcery.no"
          git add public/prices.json
          git diff --cached --quiet || git commit -m "chore: update prices $(date -u '+%Y-%m-%d')"
          git push
